<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portal Israel | חדשות הבינה המלאכותית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body>
    <header class="bg-slate-900 text-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">AI<span class="text-cyan-400">PORTAL</span></h1>
            <nav class="space-x-4 space-x-reverse">
                <a href="index.html" class="hover:text-cyan-400">בית</a>
                <a href="#" class="hover:text-cyan-400">חדשות</a>
                <a href="#" class="hover:text-cyan-400">מדריכים</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto mt-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="md:col-span-2 space-y-8" id="news-feed">
                
                <article class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition shadow-cyan-500/10">
                    <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80" alt="AI Image" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <div class="text-cyan-600 text-sm font-bold mb-2">טכנולוגיה • 09/03/2026</div>
                        <h2 class="text-2xl font-bold mb-3 text-slate-800">הסוכן האוטונומי הראשון נכנס לפעולה בישראל</h2>
                        <p class="text-slate-600 mb-4">פלטפורמת ה-AI החדשה מאפשרת לעסקים לנהל אתרים שלמים ללא מגע יד אדם...</p>
                        <a href="posts/article1.html" class="inline-block bg-slate-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-cyan-600 transition">קרא עוד</a>
                    </div>
                </article>

            </div>

            <aside class="space-y-6">
                <div class="bg-gradient-to-br from-cyan-500 to-blue-600 p-6 rounded-xl text-white shadow-lg">
                    <h3 class="font-bold text-xl mb-2">הרשמה לניוזלטר</h3>
                    <p class="text-sm opacity-90 mb-4">קבלו את חדשות ה-AI הכי חמות ישר למייל.</p>
                    <input type="email" placeholder="האימייל שלך" class="w-full p-2 rounded text-slate-800 mb-2">
                    <button class="w-full bg-slate-900 p-2 rounded font-bold">להרשמה</button>
                </div>

                <div class="bg-gray-200 h-64 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-400">
                    <span class="text-gray-500 italic">כאן תופיע פרסומת (AdSense)</span>
                </div>
            </aside>
        </div>
    </main>
</body>
</html>
